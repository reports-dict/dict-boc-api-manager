services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dict_boc_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - dict_boc_net
      - mysql8_default

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dict_boc_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - dict_boc_net
      - mysql8_default
    depends_on:
      - app

  nginx:
    image: nginx:1.25-alpine
    container_name: dict_boc_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dict_boc_net
    depends_on:
      - app

networks:
  dict_boc_net:
    driver: bridge
  mysql8_default:
    external: true
